<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>

body{
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:#222;
}

.login-box{
  background:white;
  padding:40px;
  border-radius:10px;
  width:320px;
  text-align:center;
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
}

button{
  width:100%;
  padding:10px;
  background:#ff3c00;
  color:white;
  border:none;
  cursor:pointer;
}

.social{
  margin-top:20px;
}

.social-icons{
  display:flex;
  justify-content:center;
  gap:10px;   /* space small */
  margin-top:10px;
}

.icon{
  width:35px;      /* SMALL SIZE */
  height:35px;
  border-radius:50%;
  border:1px solid #ddd;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  background:white;
}

.icon img{
  width:18px;      /* SMALL ICON */
  height:18px;
}

.icon:hover{
  transform:scale(1.1);
}

</style>
</head>

<body>

<div class="login-box">

  <h2>Login</h2>

  <input type="email" placeholder="Email">
  <input type="password" placeholder="Password">

  <button>Login</button>

  <div class="social">
    <p>Or continue with</p>

    <div class="social-icons">

      <div class="icon">
        <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png">
      </div>

      <div class="icon">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png">
      </div>

      <div class="icon">
        <img src="https://cdn-icons-png.flaticon.com/512/0/747.png">
      </div>

    </div>
  </div>

</div>

</body>

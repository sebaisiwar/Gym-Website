<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gym Home Page</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      height:100vh;

      /* Background image */
      background-image:url("https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=1200");

      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;

      color:white;
    }

    /* Dark overlay */
    .overlay{
      width:100%;
      height:100vh;
      background:rgba(0,0,0,0.6);

      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
    }

    h1{
      font-size:70px;
      margin-bottom:20px;
    }

    p{
      font-size:25px;
      margin-bottom:30px;
    }

    button{
      padding:15px 35px;
      border:none;
      background:#b81b09;
      color:white;
      font-size:20px;
      border-radius:5px;
      cursor:pointer;
    }

    button:hover{
      background:#f12711;
    }

  </style>
</head>

<body>

  <div class="overlay">

    <div>
      <h1>WELCOME TO GYMFIT</h1>
      <p>Train Hard • Stay Strong • Be Healthy</p>

      <a href="home.html">
      <button>WELCOME</button>
</a>
    </div>

  </div>

</body>
</html>
